<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — THE OUTNET WHOLESALE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #ffffff; color: #000000; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .offline-container { text-align: center; max-width: 480px; }
    .offline-logo { font-size: 28px; font-weight: 700; letter-spacing: 4px; margin-bottom: 24px; }
    .offline-icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 400; margin-bottom: 12px; }
    p { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 24px; }
    .offline-btn { display: inline-block; border: 1px solid #000; color: #000; padding: 12px 36px; font-size: 12px; letter-spacing: 2px; text-decoration: none; transition: all 0.2s; }
    .offline-btn:hover { background: #000; color: #fff; }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-logo">THE OUTNET</div>
    <div class="offline-icon">&#9888;</div>
    <h1>You're Offline</h1>
    <p>Please check your internet connection and try again. Your shopping session will resume when you're back online.</p>
    <a href="/" class="offline-btn">TRY AGAIN</a>
  </div>
</body>
</html>
