<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#121212" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Offline — THE OUTNET WHOLESALE</title>
  <link rel="icon" href="/favicon.ico" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }
    .offline-container {
      text-align: center;
      max-width: 420px;
      padding: 48px 32px;
      background: rgba(255,255,255,0.03);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .offline-icon-wrap {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .offline-icon-wrap svg {
      width: 40px;
      height: 40px;
      stroke: rgba(255,255,255,0.6);
    }
    .offline-brand {
      font-size: 14px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 12px;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #fff;
    }
    p {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .offline-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .offline-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      padding: 14px 36px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 12px;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(102,126,234,0.3);
    }
    .offline-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(102,126,234,0.45);
    }
    .offline-btn-secondary {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.6);
      box-shadow: none;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .offline-btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.8);
      box-shadow: none;
    }
    .offline-features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .offline-feature {
      text-align: center;
    }
    .offline-feature svg {
      width: 24px;
      height: 24px;
      stroke: rgba(255,255,255,0.3);
      margin-bottom: 6px;
    }
    .offline-feature span {
      display: block;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
    }
    @media (max-width: 480px) {
      .offline-container { padding: 32px 20px; }
      h1 { font-size: 20px; }
      .offline-features { gap: 12px; }
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <div class="offline-brand">THE OUTNET</div>
    <h1>You're Offline</h1>
    <p>Your connection seems to have dropped.<br />Don't worry — your data is safe. Reconnect to continue shopping.</p>
    <div class="offline-actions">
      <button class="offline-btn" onclick="window.location.reload()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Try Again
      </button>
      <a href="/" class="offline-btn offline-btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Go to Homepage
      </a>
    </div>
    <div class="offline-features">
      <div class="offline-feature">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        <span>Browse offline</span>
      </div>
      <div class="offline-feature">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <span>Secure</span>
      </div>
      <div class="offline-feature">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span>Favorites saved</span>
      </div>
    </div>
  </div>
</body>
</html>
